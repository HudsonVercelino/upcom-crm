<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UPCOM · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #E85D44;
    --coral-dark: #C94A33;
    --coral-light: #FFE4DD;
    --ink: #0E0E0E;
    --muted: #6B6760;
    --border: #ECE7E0;
    --surface: #FFFFFF;
    --bg: #F7F5F2;
    --font-sans: "Inter Tight", -apple-system, sans-serif;
    --font-display: "Bricolage Grotesque", "Inter Tight", sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 12px 40px rgba(14,14,14,0.08), 0 2px 6px rgba(14,14,14,0.04);
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--coral);
    border-radius: 8px;
    display: grid; place-items: center;
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: "";
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 10px solid #fff;
    transform: translateY(-1px);
  }
  .brand-text {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand-text em { font-style: normal; color: var(--coral); }

  .header { display: flex; flex-direction: column; gap: 6px; }
  .title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .subtitle { font-size: 13px; color: var(--muted); }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .users { display: flex; flex-direction: column; gap: 8px; }

  .user-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    cursor: pointer;
    transition: all 140ms;
    text-align: left;
    font-family: var(--font-sans);
    width: 100%;
  }
  .user-card:hover { border-color: #D9D2C8; background: #fff; }
  .user-card.active {
    border-color: var(--coral);
    background: #FFF5F2;
    box-shadow: 0 0 0 3px rgba(232,93,68,0.12);
  }

  .user-av {
    width: 38px; height: 38px;
    border-radius: 50%;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    display: grid; place-items: center;
    flex-shrink: 0;
    font-family: var(--font-display);
  }
  .user-info { display: flex; flex-direction: column; gap: 1px; }
  .user-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .user-role { font-size: 11.5px; color: var(--muted); }

  .user-check {
    margin-left: auto;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all 140ms;
  }
  .user-card.active .user-check {
    background: var(--coral);
    border-color: var(--coral);
  }
  .user-check::after {
    content: "";
    width: 5px; height: 3px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 100ms;
  }
  .user-card.active .user-check::after { opacity: 1; }

  .pw-block { display: flex; flex-direction: column; gap: 8px; }

  .pw-input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--font-sans);
    outline: none;
    background: var(--bg);
    color: var(--ink);
    transition: border-color 140ms, box-shadow 140ms;
    letter-spacing: 0.06em;
  }
  .pw-input:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 3px rgba(232,93,68,0.12);
    background: #fff;
  }
  .pw-input.error { border-color: #C2392E; box-shadow: 0 0 0 3px rgba(194,57,46,0.12); }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .pw-input.shake { animation: shake 0.4s ease; }

  .btn-login {
    width: 100%;
    padding: 11px;
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background 140ms, opacity 140ms;
    letter-spacing: 0.01em;
  }
  .btn-login:hover { background: var(--coral-dark); }
  .btn-login:disabled { opacity: 0.45; cursor: default; }

  .error-msg {
    font-size: 12.5px;
    color: #C2392E;
    font-weight: 500;
    display: none;
    text-align: center;
  }
  .error-msg.visible { display: block; }

  .footer-note {
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">UP<em>COM</em></div>
    </div>

    <div class="header">
      <div class="title">Bem-vindo de volta</div>
      <div class="subtitle">Sistema interno · Acesso restrito</div>
    </div>

    <div>
      <div class="section-label">Quem é você?</div>
      <div class="users">
        <button class="user-card" id="card-pc" onclick="selectUser('pc')">
          <div class="user-av" style="background:#2C6BB8">PC</div>
          <div class="user-info">
            <div class="user-name">Pedro Chitero</div>
            <div class="user-role">Admin · UPCOM</div>
          </div>
          <div class="user-check"></div>
        </button>
        <button class="user-card" id="card-hv" onclick="selectUser('hv')">
          <div class="user-av" style="background:#E85D44">HV</div>
          <div class="user-info">
            <div class="user-name">Hudson Vercelino</div>
            <div class="user-role">Admin · UPCOM</div>
          </div>
          <div class="user-check"></div>
        </button>
      </div>
    </div>

    <div class="pw-block">
      <div class="section-label">Senha</div>
      <input type="password" class="pw-input" id="pw-input" placeholder="Digite sua senha..." onkeydown="if(event.key==='Enter') doLogin()" />
      <button class="btn-login" id="btn-login" onclick="doLogin()" disabled>Entrar</button>
      <div class="error-msg" id="error-msg">Senha incorreta. Tente novamente.</div>
    </div>

    <div class="footer-note">
      Dúvidas? Fale com o administrador do sistema.
    </div>

  </div>
</div>

<script>
  // ─── Usuários e senhas ───────────────────────────────────────────────────────
  // Para alterar uma senha, edite o campo "password" do usuário correspondente.
  const USERS = {
    pc: { name: "Pedro Chitero",    initials: "PC", role: "Admin · UPCOM", color: "#2C6BB8", password: "pedro123"  },
    hv: { name: "Hudson Vercelino", initials: "HV", role: "Admin · UPCOM", color: "#E85D44", password: "hudson123" },
  };
  // ────────────────────────────────────────────────────────────────────────────

  // Se já estiver logado, vai direto pro dashboard
  try {
    const s = JSON.parse(localStorage.getItem('upcom_session'));
    if (s && USERS[s.user]) window.location.replace('dashboard.html');
  } catch(e) {}

  let selectedUser = null;

  function selectUser(id) {
    selectedUser = id;
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
    document.getElementById('card-' + id).classList.add('active');
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('pw-input').classList.remove('error');
    document.getElementById('btn-login').disabled = false;
    document.getElementById('pw-input').focus();
  }

  function doLogin() {
    if (!selectedUser) return;
    const pw = document.getElementById('pw-input').value;
    const user = USERS[selectedUser];

    if (pw === user.password) {
      localStorage.setItem('upcom_session', JSON.stringify({
        user: selectedUser,
        name: user.name,
        initials: user.initials,
        role: user.role,
        color: user.color,
      }));
      window.location.replace('dashboard.html');
    } else {
      const input = document.getElementById('pw-input');
      input.value = '';
      input.classList.add('error', 'shake');
      document.getElementById('error-msg').classList.add('visible');
      setTimeout(() => input.classList.remove('shake'), 400);
      input.focus();
    }
  }
</script>
</body>
</html>
