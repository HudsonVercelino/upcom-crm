<style>
/* UPCOM Digital — CRM Dashboard */
:root {
  --upcom-coral: #E85D44;
  --upcom-coral-dark: #C94A33;
  --upcom-coral-light: #FFE4DD;
  --upcom-coral-50: #FFF5F2;

  --surface-2: #FAF8F5;
  --border: #ECE7E0;
  --border-strong: #D9D2C8;
  --ink: #0E0E0E;
  --ink-2: #2A2A2A;
  --muted: #6B6760;
  --muted-2: #9B9690;
  --success: #2F8F5F;
  --success-bg: #E5F3EC;
  --warn: #C77A1B;
  --warn-bg: #FBF0DD;
  --danger: #C2392E;
  --danger-bg: #FBE5E2;
  --info: #2C6BB8;
  --info-bg: #E2EDF9;
  --font-sans: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Bricolage Grotesque", "Inter Tight", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --r-xs: 4px; --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(14,14,14,0.04),0 1px 1px rgba(14,14,14,0.02);
  --shadow-md: 0 4px 12px rgba(14,14,14,0.06),0 1px 2px rgba(14,14,14,0.04);
  --shadow-lg: 0 12px 32px rgba(14,14,14,0.08),0 2px 4px rgba(14,14,14,0.04);
  --sidebar-w: 232px;
  --sidebar-w-collapsed: 64px;
  --topbar-h: 56px;
}
[data-theme="dark"] {
  --bg: #0E0D0C; --surface: #1A1916; --surface-2: #15140F;
  --border: #2A2823; --border-strong: #3A372F;
  --ink: #F5F1EB; --ink-2: #E5DFD5; --muted: #9B9690; --muted-2: #6B6760;
  --upcom-coral-light: #3A1E16; --upcom-coral-50: #221310;
  --success-bg: #142A1F; --warn-bg: #2A1F0C; --danger-bg: #2A1410; --info-bg: #0E1F33;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; }
html,body { margin:0;padding:0;font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:"ss01","cv11"; }
button { font-family:inherit;cursor:pointer; }
.app { display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;transition:grid-template-columns 240ms cubic-bezier(.2,.7,.2,1); }
.app.collapsed { grid-template-columns:var(--sidebar-w-collapsed) 1fr; }
.sidebar { background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden; }
.brand { display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);height:var(--topbar-h);flex-shrink:0; }
.brand-mark { width:28px;height:28px;background:var(--upcom-coral);border-radius:7px;display:grid;place-items:center;flex-shrink:0;position:relative; }
.brand-mark::after { content:"";width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:9px solid #fff;transform:translateY(-1px); }
.brand-text { font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-0.02em;color:var(--ink);white-space:nowrap; }
.brand-text em { font-style:normal;color:var(--upcom-coral);font-weight:800; }

.nav-item { display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:var(--r-sm);color:var(--ink-2);cursor:pointer;font-size:13.5px;font-weight:500;margin-bottom:1px;position:relative;white-space:nowrap;transition:background 120ms; }

.nav-item:not(.active) .nav-badge { background:var(--border-strong);color:var(--ink-2); }
.sidebar-footer { padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px; }
.avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--upcom-coral) 0%,var(--upcom-coral-dark) 100%);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;flex-shrink:0; }
.sidebar-footer-text { line-height:1.2; }
.sidebar-footer-name { font-size:13px;font-weight:600;color:var(--ink); }

.main { display:flex;flex-direction:column;min-width:0; }
.topbar { height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:10; }
.topbar-toggle { background:transparent;border:0;color:var(--ink);padding:6px;border-radius:var(--r-sm);display:grid;place-items:center; }
.topbar-toggle:hover { background:var(--surface-2); }
.search { flex:1;max-width:420px;position:relative; }
.search input { width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 12px 7px 34px;font-size:13px;color:var(--ink);font-family:inherit;outline:none;transition:border-color 120ms,background 120ms; }
.search input:focus { border-color:var(--upcom-coral);background:var(--surface); }

.search kbd { position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--muted); }
.topbar-spacer { flex:1; }
.topbar-actions { display:flex;align-items:center;gap:6px; }
.icon-btn { background:transparent;border:0;width:34px;height:34px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--ink-2);position:relative; }
.icon-btn:hover { background:var(--surface-2); }
.icon-btn .dot { position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--upcom-coral);border-radius:50%;border:2px solid var(--surface); }
.btn-primary { background:var(--upcom-coral);color:#fff;border:0;padding:8px 14px;border-radius:var(--r-sm);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:background 120ms; }
.btn-primary:hover { background:var(--upcom-coral-dark); }
.btn-secondary { background:var(--surface);color:var(--ink);border:1px solid var(--border-strong);padding:7px 12px;border-radius:var(--r-sm);font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:6px; }
.btn-secondary:hover { background:var(--surface-2); }
.content { padding:24px;display:flex;flex-direction:column;gap:16px;max-width:1600px;width:100%;margin:0 auto; }
.page-header { display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap; }
.page-title-block { display:flex;flex-direction:column;gap:4px; }
.page-title { font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);margin:0;line-height:1.1; }
.page-subtitle { color:var(--muted);font-size:13.5px; }
.page-subtitle strong { color:var(--ink-2);font-weight:600; }
.filters { display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
.segmented { display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px; }

.kpi-trend.up { color:var(--success); }

.kpi.featured { background:var(--ink);color:var(--bg); }
.kpi.featured .kpi-label,.kpi.featured .kpi-value { color:#FFFFFF; }
.kpi.featured .kpi-label { color:rgba(255,255,255,0.6); }
.kpi.featured:hover { background:var(--ink-2); }
.grid-3 { display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:16px; }
.grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
.card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;overflow:hidden; }
.card-header { padding:16px 18px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px; }
.card-title-block { display:flex;flex-direction:column;gap:2px; }
.card-title { font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);margin:0; }
.card-subtitle { font-size:12px;color:var(--muted); }
.card-actions { display:flex;gap:4px;align-items:center; }
.tab-pill { background:transparent;border:0;padding:4px 10px;font-size:12px;font-weight:500;color:var(--muted);border-radius:999px; }
.tab-pill.active { background:var(--upcom-coral-50);color:var(--upcom-coral);font-weight:600; }
.card-body { padding:0 18px 18px;flex:1; }
.card-footer { padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted); }
.card-footer a { color:var(--upcom-coral);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px; }
.revenue-stats { display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:12px; }

.revenue-stat-meta { font-size:11.5px;color:var(--muted);margin-top:2px; }
.revenue-stat-meta .pos { color:var(--success);font-weight:600; }
.chart-wrap { position:relative;height:240px;width:100%; }
.chart-legend { display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-bottom:4px; }
.chart-legend .dot { display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:-1px; }
.funnel { display:flex;flex-direction:column;gap:8px;padding-top:4px; }
.funnel-row { position:relative;cursor:pointer;transition:transform 120ms; }

.funnel-bar { background:var(--upcom-coral);color:#fff;border-radius:var(--r-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden; }
.funnel-bar::after { content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none; }
.funnel-stage { font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px; }
.funnel-stage .num { font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,0.18);padding:1px 5px;border-radius:3px; }
.funnel-count { font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:-0.01em; }
.funnel-meta { display:flex;justify-content:space-between;padding:0 4px;font-size:11px;color:var(--muted);margin-top:2px; }
.funnel-meta .conv { color:var(--success);font-weight:600; }
.activity { display:flex;flex-direction:column;gap:0;max-height:360px;overflow-y:auto; }
.activity-item { display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border);align-items:flex-start; }
.activity-item:last-child { border-bottom:0; }
.activity-avatar { width:28px;height:28px;border-radius:50%;background:var(--upcom-coral-light);color:var(--upcom-coral-dark);font-weight:700;font-size:11px;display:grid;place-items:center;flex-shrink:0; }
.activity-body { flex:1;min-width:0; }
.activity-text { font-size:12.5px;color:var(--ink-2);line-height:1.4; }
.activity-text strong { color:var(--ink);font-weight:600; }
.activity-text .tag { display:inline-block;background:var(--surface-2);border:1px solid var(--border);font-family:var(--font-mono);font-size:10.5px;padding:0px 5px;border-radius:3px;color:var(--ink-2); }

.table-wrap { overflow-x:auto; }

.client-name { font-weight:600;color:var(--ink);font-size:13px; }
.client-sub { font-size:11px;color:var(--muted); }

.tag-pill .dot { width:6px;height:6px;border-radius:50%;background:currentColor; }
.tag-discovery { background:var(--info-bg);color:var(--info); }
.tag-design { background:var(--upcom-coral-light);color:var(--upcom-coral-dark); }
.tag-dev { background:var(--warn-bg);color:var(--warn); }
.tag-qa { background:#EFE4F5;color:#6E3D9A; }

.progress-fill.done { background:var(--success); }

.team-stack { display:flex; }

<div id="root"></div>

<script>
// Auth guard — redireciona para login se não houver sessão válida
(function() {
  try {
    const s = JSON.parse(localStorage.getItem('upcom_session'));
    if (!s || !s.user) throw new Error();
    window.UPCOM_USER = s;
  } catch(e) {
    window.location.replace('login.html');
    document.write('');
  }
  window.upcomLogout = function() {
    localStorage.removeItem('upcom_session');
    window.location.replace('login.html');
  };
})();
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = { x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)), y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)) };
    panel.style.right = offsetRef.current.x + 'px'; panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    const onMsg = (e) => { const t = e?.data?.type; if (t === '__activate_edit_mode') setOpen(true); else if (t === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  if (!open) return null;
  return (<><style>{__TWEAKS_STYLE}</style><div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}><div className="twk-hd"><b>{title}</b><button className="twk-x" onClick={dismiss}>✕</button></div><div className="twk-body">{children}</div></div></>);
}

function TweakSection({ label, title, children }) {
  return (<><div className="twk-sect">{title || label}</div>{children}</>);
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value); valueRef.current = value;
  const segAt = (clientX) => { const r = trackRef.current.getBoundingClientRect(); const inner = r.width - 4; const i = Math.floor(((clientX - r.left - 2) / inner) * n); return opts[Math.max(0, Math.min(n - 1, i))].value; };
  const onPointerDown = (e) => { const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0); const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); }; const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); }; window.addEventListener('pointermove', move); window.addEventListener('pointerup', up); };
  return (<div className="twk-row"><div className="twk-lbl"><span>{label}</span></div><div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className="twk-seg"><div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />{opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}</div></div>);
}

function TweakColor({ label, value, onChange }) {
  return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} /></div>);
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor });

const Sparkline = ({ data, color = "currentColor", w = 56, h = 18 }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`).join(" ");
  return (<svg className="kpi-spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>);
};

const fmtNum = (v, fmt) => {
  if (fmt === "currency") { if (v >= 1000) return (v / 1000).toFixed(1).replace(".", ",") + "k"; return v.toLocaleString("pt-BR"); }
  if (fmt === "percent") return v.toFixed(1).replace(".", ",") + "%";
  return v.toLocaleString("pt-BR");
};

const Kpi = ({ k }) => (
  <div className={"kpi" + (k.featured ? " featured" : "")}>
    <div className="kpi-label">{k.label}</div>
    <div className="kpi-value">{k.currency && <span className="currency">{k.currency}</span>}{fmtNum(k.value, k.format)}</div>
    <div className={"kpi-trend " + (k.trend >= 0 ? "up" : "down")}>{k.trend >= 0 ? <Icon.ArrowUp /> : <Icon.ArrowDown />}{Math.abs(k.trend).toFixed(1).replace(".", ",")}%<span className="vs">{k.vs}</span></div>
    <Sparkline data={k.spark} color={k.featured ? "var(--upcom-coral)" : "var(--muted-2)"} />
  </div>
);

window.Sidebar = Sidebar;
window.Topbar = Topbar;
window.Kpi = Kpi;
window.Sparkline = Sparkline;
</script>

<script type="text/babel">
// widgets — RevenueChart, Funnel, Activity

  const areaPath = actualPath + ` L${x(d.actuals.findLastIndex(v=>v!=null))},${y(0)} L${x(0)},${y(0)} Z`;

  return (
    <div className="card" style={{ minHeight: 0 }}>
      <div className="card-header">

        <div className="card-actions"><button className="tab-pill">12m</button><button className="tab-pill active">YTD</button><button className="tab-pill">90d</button><button className="icon-btn"><Icon.Download /></button></div>
      </div>
      <div className="card-body">
        <div className="revenue-stats">
          <div><div className="revenue-stat-label">Faturado YTD</div><div className="revenue-stat-value"><span style={{fontSize:14,color:"var(--muted)",fontWeight:500,marginRight:2}}>R$</span>2.96M</div><div className="revenue-stat-meta"><span className="pos">↑ 28,4%</span> vs. 2025</div></div>
          <div><div className="revenue-stat-label">Meta anual</div><div className="revenue-stat-value"><span style={{fontSize:14,color:"var(--muted)",fontWeight:500,marginRight:2}}>R$</span>4.80M</div><div className="revenue-stat-meta">61,6% atingido · 5 meses</div></div>
          <div><div className="revenue-stat-label">Pipeline aberto</div><div className="revenue-stat-value"><span style={{fontSize:14,color:"var(--muted)",fontWeight:500,marginRight:2}}>R$</span>287k</div><div className="revenue-stat-meta">24 oportunidades · prob. 64%</div></div>
        </div>
        <div className="chart-legend"><span><span className="dot" style={{background:"var(--upcom-coral)"}}></span>Faturado</span><span><span className="dot" style={{background:"var(--ink)",opacity:0.35}}></span>Meta</span><span><span className="dot" style={{background:"var(--upcom-coral-light)"}}></span>Projetado</span></div>
        <div className="chart-wrap">
          <svg width="100%" height="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
            <defs><linearGradient id="revGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="var(--upcom-coral)" stopOpacity="0.22"/><stop offset="100%" stopColor="var(--upcom-coral)" stopOpacity="0"/></linearGradient></defs>
            {yTicks.map((t, i) => (<g key={i}><line x1={pad.l} x2={w - pad.r} y1={y(t)} y2={y(t)} stroke="var(--border)" strokeDasharray="2 3"/><text x={pad.l - 6} y={y(t) + 3} textAnchor="end" fill="var(--muted)" fontSize="9.5" fontFamily="var(--font-mono)">{t}</text></g>))}
            {d.months.map((m, i) => (<text key={i} x={x(i)} y={h - 6} textAnchor="middle" fill="var(--muted)" fontSize="9.5">{m}</text>))}
            <path d={areaPath} fill="url(#revGrad)"/>
            <path d={targetPath} fill="none" stroke="var(--ink)" strokeWidth="1.5" strokeDasharray="4 3" opacity="0.4"/>
            <path d={actualPath} fill="none" stroke="var(--upcom-coral)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            {d.actuals.map((v, i) => v != null && (<circle key={i} cx={x(i)} cy={y(v)} r={i === d.actuals.findLastIndex(v=>v!=null) ? 4 : 2.5} fill="var(--upcom-coral)" stroke="var(--surface)" strokeWidth="1.5"/>))}
          </svg>
        </div>
      </div>
      <div className="card-footer"><span>Atualizado há 4 minutos</span><a href="#">Ver relatório completo <Icon.ChevronRight /></a></div>
    </div>
  );
};

window.RevenueChart = RevenueChart;
window.Funnel = Funnel;

</script>

<script type="text/babel">
// projects-table
const phaseTags = { discovery:{cls:"tag-discovery",label:"Discovery"}, design:{cls:"tag-design",label:"Design"}, dev:{cls:"tag-dev",label:"Desenvolvimento"}, qa:{cls:"tag-qa",label:"QA"}, launch:{cls:"tag-launch",label:"Lançamento"} };
const ProjectsTable = () => {
  const [filter, setFilter] = React.useState("all");
  const all = window.UPCOM_DATA.projects;
  const projects = filter === "all" ? all : all.filter(p => p.phase === filter);
  return (
    <div className="card">
      <div className="card-header">
        <div className="card-title-block"><h3 className="card-title">Projetos ativos</h3><div className="card-subtitle">{projects.length} projetos · valor total {(projects.reduce((s,p)=>s+p.value,0)/1000).toFixed(0)}k em entrega</div></div>
        <div className="card-actions" style={{flexWrap:"wrap"}}>
          {[["all","Todos"],["discovery","Discovery"],["design","Design"],["dev","Dev"],["qa","QA"],["launch","Launch"]].map(([k,l]) => (<button key={k} className={"tab-pill" + (filter === k ? " active" : "")} onClick={() => setFilter(k)}>{l}</button>))}
          <button className="btn-secondary"><Icon.Filter /> Filtros</button>
          <button className="btn-secondary"><Icon.Download /></button>
        </div>
      </div>
      <div className="table-wrap">
        <table className="data">
          <thead><tr><th style={{paddingLeft:18,width:"24%"}}>Cliente / Projeto</th><th>Fase</th><th>Responsável</th><th>Equipe</th><th style={{width:"18%"}}>Progresso</th><th>Prazo</th><th>Valor</th><th>Saúde</th><th style={{paddingRight:18}}></th></tr></thead>
          <tbody>
            {projects.map((p, i) => {
              const phase = phaseTags[p.phase];
              const fillCls = p.progress >= 95 ? "done" : p.deadlineState === "late" ? "late" : "";
              return (
                <tr key={i}>
                  <td style={{paddingLeft:18}}><div className="client-cell"><div className="client-logo" style={{background:p.logoColor}}>{p.initials}</div><div className="client-info"><div className="client-name">{p.name}</div><div className="client-sub">{p.domain}</div></div></div></td>
                  <td><span className={"tag-pill " + phase.cls}><span className="dot"></span>{phase.label}</span></td>
                  <td>{p.lead}</td>
                  <td><div className="team-stack">{p.team.map((t, k) => (<div className="avatar" key={k} style={{background:`oklch(${55+k*6}% 0.14 ${20+k*40})`}}>{t}</div>))}{p.extra > 0 && <div className="more">+{p.extra}</div>}</div></td>
                  <td><div className="progress"><div className="progress-bar"><div className={"progress-fill " + fillCls} style={{width:p.progress+"%"}}></div></div><span className="progress-num">{p.progress}%</span></div></td>
                  <td><span className={"deadline-cell " + (p.deadlineState||"")}>{p.deadline}</span></td>
                  <td style={{fontFamily:"var(--font-mono)",fontSize:12}}>R$ {(p.value/1000).toFixed(1).replace(".",",")}k</td>
                  <td><span className={"health " + (p.health==="ok"?"":p.health)}><span className="pulse"></span>{p.health==="ok"?"No prazo":p.health==="warn"?"Atenção":"Atrasado"}</span></td>
                  <td style={{paddingRight:18}}><button className="row-action"><Icon.More /></button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="card-footer"><span>Mostrando {projects.length} de {all.length} projetos</span><a href="#">Abrir gestão de projetos <Icon.ChevronRight /></a></div>
    </div>
  );
};
window.ProjectsTable = ProjectsTable;
</script>

            <div className="kpi-row">{kpis.map(k => <Kpi key={k.id} k={k} />)}</div>

            <ProjectsTable />
          </div>
        </div>
      </div>

        <TweakSection title="Marca"><TweakColor label="Cor primária" value={tweaks.primaryColor} onChange={v => setTweak("primaryColor", v)} /></TweakSection>
        <TweakSection title="Aparência"><TweakRadio label="Tema" value={tweaks.theme} onChange={v => setTweak("theme", v)} options={[{value:"light",label:"Claro"},{value:"dark",label:"Escuro"}]} /></TweakSection>
        <TweakSection title="Cores rápidas">

              <button key={c} onClick={()=>setTweak("primaryColor",c)} title={n} style={{width:32,height:32,borderRadius:8,background:c,border:tweaks.primaryColor===c?"2px solid var(--ink)":"1px solid var(--border)",cursor:"pointer",padding:0}} />

          </div>
        </TweakSection>
      </TweaksPanel>
    </>

};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
