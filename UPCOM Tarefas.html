<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UPCOM · Tarefas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* UPCOM Digital — base */
:root {
  --upcom-coral: #E85D44;
  --upcom-coral-dark: #C94A33;
  --upcom-coral-light: #FFE4DD;
  --upcom-coral-50: #FFF5F2;
  --bg: #F7F5F2;
  --surface: #FFFFFF;
  --surface-2: #FAF8F5;
  --border: #ECE7E0;
  --border-strong: #D9D2C8;
  --ink: #0E0E0E;
  --ink-2: #2A2A2A;
  --muted: #6B6760;
  --muted-2: #9B9690;
  --success: #2F8F5F;
  --success-bg: #E5F3EC;
  --warn: #C77A1B;
  --warn-bg: #FBF0DD;
  --danger: #C2392E;
  --danger-bg: #FBE5E2;
  --info: #2C6BB8;
  --info-bg: #E2EDF9;
  --font-sans: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Bricolage Grotesque", "Inter Tight", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --r-xs: 4px; --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(14,14,14,0.04),0 1px 1px rgba(14,14,14,0.02);
  --shadow-md: 0 4px 12px rgba(14,14,14,0.06),0 1px 2px rgba(14,14,14,0.04);
  --shadow-lg: 0 12px 32px rgba(14,14,14,0.08),0 2px 4px rgba(14,14,14,0.04);
  --sidebar-w: 232px;
  --sidebar-w-collapsed: 64px;
  --topbar-h: 56px;
}
[data-theme="dark"] {
  --bg: #0E0D0C; --surface: #1A1916; --surface-2: #15140F;
  --border: #2A2823; --border-strong: #3A372F;
  --ink: #F5F1EB; --ink-2: #E5DFD5; --muted: #9B9690; --muted-2: #6B6760;
  --upcom-coral-light: #3A1E16; --upcom-coral-50: #221310;
  --success-bg: #142A1F; --warn-bg: #2A1F0C; --danger-bg: #2A1410; --info-bg: #0E1F33;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; }
html,body { margin:0;padding:0;font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale; }
button { font-family:inherit;cursor:pointer; }
.app { display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;transition:grid-template-columns 240ms cubic-bezier(.2,.7,.2,1); }
.app.collapsed { grid-template-columns:var(--sidebar-w-collapsed) 1fr; }
.sidebar { background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden; }
.brand { display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);height:var(--topbar-h);flex-shrink:0; }
.brand-mark { width:28px;height:28px;background:var(--upcom-coral);border-radius:7px;display:grid;place-items:center;flex-shrink:0;position:relative; }
.brand-mark::after { content:"";width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:9px solid #fff;transform:translateY(-1px); }
.brand-text { font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-0.02em;color:var(--ink);white-space:nowrap; }
.brand-text em { font-style:normal;color:var(--upcom-coral);font-weight:800; }
.collapsed .brand-text,.collapsed .nav-label,.collapsed .nav-section-label,.collapsed .sidebar-footer-text { display:none; }
.collapsed .nav-item { justify-content:center; }
.nav { flex:1;overflow-y:auto;padding:12px 10px; }
.nav-section { margin-bottom:18px; }
.nav-section-label { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted-2);padding:6px 12px 8px; }
.nav-item { display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:var(--r-sm);color:var(--ink-2);cursor:pointer;font-size:13.5px;font-weight:500;margin-bottom:1px;position:relative;white-space:nowrap;transition:background 120ms; }
.nav-item:hover { background:var(--surface-2); }
.nav-item.active { background:var(--upcom-coral-50);color:var(--upcom-coral); }
.nav-item.active::before { content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:3px;background:var(--upcom-coral);border-radius:0 3px 3px 0; }
.nav-item svg { flex-shrink:0; }
.nav-badge { margin-left:auto;background:var(--upcom-coral);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center; }
.nav-item:not(.active) .nav-badge { background:var(--border-strong);color:var(--ink-2); }
.sidebar-footer { padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px; }
.avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--upcom-coral) 0%,var(--upcom-coral-dark) 100%);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;flex-shrink:0; }
.sidebar-footer-text { line-height:1.2; }
.sidebar-footer-name { font-size:13px;font-weight:600;color:var(--ink); }
.sidebar-footer-role { font-size:11px;color:var(--muted); }
.main { display:flex;flex-direction:column;min-width:0; }
.topbar { height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:10; }
.topbar-toggle { background:transparent;border:0;color:var(--ink);padding:6px;border-radius:var(--r-sm);display:grid;place-items:center; }
.topbar-toggle:hover { background:var(--surface-2); }
.search { flex:1;max-width:420px;position:relative; }
.search input { width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 12px 7px 34px;font-size:13px;color:var(--ink);font-family:inherit;outline:none;transition:border-color 120ms,background 120ms; }
.search input:focus { border-color:var(--upcom-coral);background:var(--surface); }
.search input::placeholder { color:var(--muted-2); }
.search svg { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted); }
.search kbd { position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--muted); }
.topbar-spacer { flex:1; }
.topbar-actions { display:flex;align-items:center;gap:6px; }
.icon-btn { background:transparent;border:0;width:34px;height:34px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--ink-2);position:relative; }
.icon-btn:hover { background:var(--surface-2); }
.icon-btn .dot { position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--upcom-coral);border-radius:50%;border:2px solid var(--surface); }
.btn-primary { background:var(--upcom-coral);color:#fff;border:0;padding:8px 14px;border-radius:var(--r-sm);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:background 120ms; }
.btn-primary:hover { background:var(--upcom-coral-dark); }
.btn-secondary { background:var(--surface);color:var(--ink);border:1px solid var(--border-strong);padding:7px 12px;border-radius:var(--r-sm);font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:6px; }
.btn-secondary:hover { background:var(--surface-2); }
.content { padding:24px;display:flex;flex-direction:column;gap:16px;max-width:1600px;width:100%;margin:0 auto; }
.page-header { display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap; }
.page-title-block { display:flex;flex-direction:column;gap:4px; }
.page-title { font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);margin:0;line-height:1.1; }
.page-subtitle { color:var(--muted);font-size:13.5px; }
.page-subtitle strong { color:var(--ink-2);font-weight:600; }
.filters { display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
.card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;overflow:hidden; }
.table-wrap { overflow-x:auto; }
table.data { width:100%;border-collapse:separate;border-spacing:0;font-size:13px; }
table.data th { text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap; }
table.data td { padding:12px 14px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle; }
table.data tr { transition:background 100ms;cursor:pointer; }
table.data tbody tr:hover { background:var(--surface-2); }
table.data tbody tr:last-child td { border-bottom:0; }
.team-stack { display:flex; }
.team-stack .avatar { width:24px;height:24px;font-size:9.5px;border:2px solid var(--surface);margin-left:-7px; }
.team-stack .avatar:first-child { margin-left:0; }
.deadline-cell { font-family:var(--font-mono);font-size:12px; }
.deadline-cell.late { color:var(--danger);font-weight:600; }
.deadline-cell.soon { color:var(--warn);font-weight:600; }
::-webkit-scrollbar { width:10px;height:10px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-strong);border-radius:999px;border:2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background:var(--muted-2); }

/* Tasks styles */
.tasks-toolbar { display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 0; }
.tasks-toolbar .search { max-width:280px;flex:0 1 280px; }
.tasks-toolbar .spacer { flex:1; }
.sprint-bar { display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;gap:16px;box-shadow:var(--shadow-sm);flex-wrap:wrap; }
.sprint-info { display:flex;flex-direction:column;gap:3px;min-width:0; }
.sprint-name { font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-0.01em;color:var(--ink);display:flex;align-items:center;gap:8px; }
.sprint-name .pill { background:var(--upcom-coral-light);color:var(--upcom-coral-dark);font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px; }
.sprint-meta { font-size:12px;color:var(--muted); }
.sprint-progress { flex:1;max-width:360px;min-width:220px; }
.sprint-progress-track { height:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:999px;overflow:hidden;position:relative;display:flex; }
.sprint-progress-track>div { height:100%;transition:width 400ms cubic-bezier(.2,.7,.2,1); }
.sprint-progress-track .seg-done { background:var(--success); }
.sprint-progress-track .seg-doing { background:var(--upcom-coral); }
.sprint-progress-track .seg-review { background:var(--warn); }
.sprint-progress-numbers { display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted); }
.sprint-progress-numbers strong { color:var(--ink);font-weight:700; }
.sprint-team { display:flex;align-items:center;gap:12px; }
.sprint-team-label { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600; }
.view-switch { display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden; }
.view-switch button { background:var(--surface);border:0;padding:6px 12px;font-size:12px;font-weight:500;color:var(--muted);display:inline-flex;align-items:center;gap:5px;border-right:1px solid var(--border); }
.view-switch button:last-child { border-right:0; }
.view-switch button.active { background:var(--ink);color:var(--bg); }
.filter-chip { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-weight:500; }
.filter-chip:hover { border-color:var(--border-strong); }
.filter-chip.active { background:var(--upcom-coral-50);border-color:var(--upcom-coral);color:var(--upcom-coral-dark); }
.assignee-filters { display:flex;gap:4px;align-items:center; }
.assignee-chip { width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;position:relative;transition:transform 100ms;padding:0;background:transparent; }
.assignee-chip:hover { transform:translateY(-1px); }
.assignee-chip.active { border-color:var(--upcom-coral); }
.assignee-chip .av { width:100%;height:100%;border-radius:50%;display:grid;place-items:center;color:#fff; }
.board-wrap { margin:0 -24px;padding:0 24px 24px;overflow-x:auto; }
.board { display:grid;grid-auto-flow:column;grid-auto-columns:300px;gap:14px;align-items:flex-start;min-height:calc(100vh - 320px);padding-bottom:8px; }
.column { background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;max-height:calc(100vh - 120px);transition:background 120ms,border-color 120ms; }
.column.drag-over { background:var(--upcom-coral-50);border-color:var(--upcom-coral);border-style:dashed; }
.col-header { display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;gap:8px;flex-shrink:0; }
.col-title { display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink); }
.col-dot { width:8px;height:8px;border-radius:50%; }
.col-dot.backlog { background:var(--muted-2); }
.col-dot.todo { background:var(--info); }
.col-dot.doing { background:var(--upcom-coral); }
.col-dot.review { background:var(--warn); }
.col-dot.client { background:#9333EA; }
.col-dot.done { background:var(--success); }
.col-count { font-family:var(--font-mono);font-size:11px;color:var(--muted);font-weight:500; }
.col-wip { font-family:var(--font-mono);font-size:10px;background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--muted); }
.col-wip.over { background:var(--danger-bg);border-color:var(--danger);color:var(--danger); }
.col-actions { display:flex;gap:2px; }
.col-actions .icon-btn { width:24px;height:24px; }
.col-body { display:flex;flex-direction:column;gap:8px;padding:4px 10px 10px;overflow-y:auto;flex:1; }
.col-add { background:transparent;border:1px dashed var(--border-strong);border-radius:var(--r-md);padding:8px;color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all 120ms; }
.col-add:hover { color:var(--upcom-coral);border-color:var(--upcom-coral);background:var(--upcom-coral-50); }
.task-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px 10px;display:flex;flex-direction:column;gap:8px;cursor:grab;box-shadow:var(--shadow-sm);transition:transform 120ms,box-shadow 120ms,border-color 120ms;position:relative;border-left:3px solid var(--border-strong); }
.task-card:hover { border-color:var(--border-strong);box-shadow:var(--shadow-md);transform:translateY(-1px); }
.task-card.dragging { opacity:0.4;cursor:grabbing;transform:rotate(1.5deg) scale(1.02); }
.task-card.priority-high { border-left-color:var(--danger); }
.task-card.priority-med { border-left-color:var(--warn); }
.task-card.priority-low { border-left-color:var(--success); }
.task-card.overdue { background:linear-gradient(180deg,var(--danger-bg) 0%,var(--surface) 32%); }
.task-card.blocked { background:linear-gradient(180deg,#FBE5E2 0%,var(--surface) 32%); }
.task-card.done { opacity:0.72; }
.task-top { display:flex;align-items:flex-start;justify-content:space-between;gap:6px; }
.task-id { font-family:var(--font-mono);font-size:10px;color:var(--muted);font-weight:500; }
.task-priority { font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:1px 5px;border-radius:3px;display:inline-flex;align-items:center;gap:3px; }
.task-priority.priority-high { background:var(--danger-bg);color:var(--danger); }
.task-priority.priority-med { background:var(--warn-bg);color:var(--warn); }
.task-priority.priority-low { background:var(--success-bg);color:var(--success); }
.task-title { font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;letter-spacing:-0.005em;text-wrap:pretty; }
.task-card.done .task-title { text-decoration:line-through;text-decoration-color:var(--muted-2); }
.task-labels { display:flex;flex-wrap:wrap;gap:4px; }
.task-label { font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border);text-transform:lowercase;letter-spacing:0.01em; }
.task-project { display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500; }
.task-project .pdot { width:8px;height:8px;border-radius:2px;flex-shrink:0; }
.task-progress { height:4px;background:var(--border);border-radius:999px;overflow:hidden; }
.task-progress>div { height:100%;background:var(--upcom-coral);border-radius:999px; }
.task-meta { display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px; }
.task-meta-left { display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px; }
.task-meta-item { display:inline-flex;align-items:center;gap:3px; }
.task-meta-item.overdue { color:var(--danger);font-weight:600; }
.task-meta-item.due-today { color:var(--warn);font-weight:600; }
.task-meta-item.checklist-done { color:var(--success);font-weight:600; }
.task-assignees { display:flex; }
.task-assignees .av-mini { width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:9px;font-weight:700;border:2px solid var(--surface);margin-left:-6px;font-family:var(--font-display); }
.task-assignees .av-mini:first-child { margin-left:0; }
.task-flag { position:absolute;top:-1px;right:8px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;padding:2px 6px 3px;border-radius:0 0 4px 4px;text-transform:uppercase;letter-spacing:0.06em; }
.task-flag.blocked { background:var(--danger); }
.task-flag.waiting { background:#9333EA; }
.modal-backdrop { position:fixed;inset:0;background:rgba(14,14,14,0.45);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:center;padding:24px;animation:fadeIn 160ms ease-out; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);max-width:720px;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);animation:slideUp 220ms cubic-bezier(.2,.7,.2,1); }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.modal-header { display:flex;align-items:flex-start;justify-content:space-between;padding:18px 22px 12px;gap:14px;border-bottom:1px solid var(--border); }
.modal-title-block { display:flex;flex-direction:column;gap:4px;min-width:0; }
.modal-id-row { display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted); }
.modal-title { font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-0.015em;color:var(--ink);margin:0;text-wrap:pretty; }
.modal-body { display:grid;grid-template-columns:1fr 220px;gap:0;overflow-y:auto;flex:1; }
.modal-main { padding:16px 22px;display:flex;flex-direction:column;gap:18px; }
.modal-sidebar { background:var(--surface-2);border-left:1px solid var(--border);padding:16px 18px;display:flex;flex-direction:column;gap:14px;font-size:12px; }
.modal-side-label { font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;color:var(--muted);margin-bottom:4px; }
.modal-side-value { font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
.modal-section-title { font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:700;color:var(--muted);margin:0 0 8px; }
.modal-desc { font-size:13px;color:var(--ink-2);line-height:1.55;text-wrap:pretty; }
.checklist-progress { height:4px;background:var(--border);border-radius:999px;margin-bottom:8px;overflow:hidden; }
.checklist-progress>div { height:100%;background:var(--success); }
.checklist-item { display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13px;color:var(--ink-2);cursor:pointer; }
.checklist-item input { accent-color:var(--upcom-coral); }
.checklist-item.done { color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted-2); }
.comment { display:flex;gap:10px;padding:8px 0; }

<script type="text/babel">
// Kanban board components
const D = window.UPCOM_TASKS;

const dueState = (dueStr) => {
  if (!dueStr) return { label: "—", state: "" };
  const today = D.TODAY;
  const due = new Date(dueStr);
  const days = Math.floor((due - today) / 86400000);
  const fmt = due.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" }).replace(".", "");
  if (days < 0) return { label: `${fmt} · ${Math.abs(days)}d atraso`, state: "overdue" };
  if (days === 0) return { label: "Hoje", state: "due-today" };
  if (days === 1) return { label: "Amanhã", state: "due-today" };
  if (days <= 3) return { label: fmt, state: "due-today" };
  return { label: fmt, state: "" };
};

const Avatar = ({ id, size = 22 }) => {
  const m = D.TEAM.find(t => t.id === id);
  if (!m) return null;
  return (<div className="av-mini" style={{ background: m.color, width: size, height: size, fontSize: size * 0.4 }} title={m.name}>{m.initials}</div>);
};

const TaskCard = ({ task, onOpen, onDragStart, onDragEnd, dragging }) => {
  const project = task.project ? D.PROJECTS.find(p => p.id === task.project) : null;
  const due = dueState(task.due);
  const isOverdue = due.state === "overdue" && task.col !== "done";
  const checklistDone = task.checklist[0] === task.checklist[1] && task.checklist[1] > 0;
  let className = "task-card priority-" + task.priority;
  if (isOverdue) className += " overdue";
  if (task.blocked) className += " blocked";
  if (task.col === "done") className += " done";
  if (dragging) className += " dragging";
  const priLabel = { high: "Alta", med: "Média", low: "Baixa" }[task.priority];
  return (
    <div className={className} draggable onDragStart={(e) => onDragStart(task, e)} onDragEnd={onDragEnd} onClick={() => onOpen(task)}>
      {task.blocked && <span className="task-flag blocked">Bloqueado</span>}
      {task.col === "client" && task.waitingSince && <span className="task-flag waiting">{task.waitingSince}d esperando</span>}
      <div className="task-top"><span className="task-id">{task.id}</span><span className={"task-priority priority-" + task.priority}>{priLabel}</span></div>
      <div className="task-title">{task.title}</div>
      {task.labels.length > 0 && (<div className="task-labels">{task.labels.map((l, i) => <span key={i} className="task-label">{l}</span>)}</div>)}
      {project && (<div className="task-project"><span className="pdot" style={{ background: project.color }}></span>{project.name}</div>)}
      {task.progress != null && (<div className="task-progress"><div style={{ width: task.progress + "%" }}></div></div>)}
      <div className="task-meta">
        <div className="task-meta-left">
          <span className={"task-meta-item " + (checklistDone ? "checklist-done" : "")}><Icon.Check style={{width:12,height:12}} /> {task.checklist[0]}/{task.checklist[1]}</span>
          {task.comments > 0 && (<span className="task-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a8 8 0 0 1-11.6 7.1L3 21l1.9-6.4A8 8 0 1 1 21 12z"/></svg>{task.comments}</span>)}
          {task.attachments > 0 && (<span className="task-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21 11-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-9 9a2 2 0 0 1-3-3l8-8"/></svg>{task.attachments}</span>)}
          {task.due && (<span className={"task-meta-item " + due.state}><Icon.Calendar style={{width:12,height:12}} /> {due.label}</span>)}
        </div>
        <div className="task-assignees">{task.assignees.map(a => <Avatar key={a} id={a} />)}</div>
      </div>
    </div>
  );
};

const Column = ({ col, tasks, onOpen, onDragStart, onDragEnd, draggingId, onDrop, dragOver, onDragEnter, onAdd }) => {
  const wipOver = col.wip && tasks.length > col.wip;
  return (
    <div className={"column" + (dragOver ? " drag-over" : "")} onDragOver={(e) => { e.preventDefault(); }} onDragEnter={() => onDragEnter(col.id)} onDrop={() => onDrop(col.id)}>
      <div className="col-header">
        <div className="col-title"><span className={"col-dot " + col.id}></span>{col.name}<span className="col-count">{tasks.length}</span>{col.wip && <span className={"col-wip" + (wipOver ? " over" : "")}>WIP {tasks.length}/{col.wip}</span>}</div>
        <div className="col-actions"><button className="icon-btn" title="Adicionar" onClick={onAdd}><Icon.Plus /></button><button className="icon-btn"><Icon.More /></button></div>
      </div>
      <div className="col-body">
        {tasks.map(t => (<TaskCard key={t.id} task={t} onOpen={onOpen} onDragStart={onDragStart} onDragEnd={onDragEnd} dragging={draggingId === t.id} />))}
        <button className="col-add" onClick={onAdd}><Icon.Plus /> Adicionar tarefa</button>
      </div>
    </div>
  );
};

window.TaskCard = TaskCard;
window.Column = Column;
window.Avatar = Avatar;
window.dueState = dueState;
</script>

<script type="text/babel">
// Main tasks app
const TASKS_TWEAK_DEFAULTS = { "primaryColor": "#E85D44", "theme": "light" };

const TasksApp = () => {
  const D = window.UPCOM_TASKS;
  const [tweaks, setTweak] = window.useTweaks(TASKS_TWEAK_DEFAULTS);
  const [collapsed, setCollapsed] = React.useState(false);
  const [tasks, setTasks] = React.useState(D.TASKS);
  const [view, setView] = React.useState("kanban");
  const [openTask, setOpenTask] = React.useState(null);
  const [search, setSearch] = React.useState("");
  const [filterAssignees, setFilterAssignees] = React.useState([]);
  const [filterPriority, setFilterPriority] = React.useState(null);
  const [filterProject, setFilterProject] = React.useState(null);
  const [draggingId, setDraggingId] = React.useState(null);
  const [dragOverCol, setDragOverCol] = React.useState(null);
  const [newTaskCol, setNewTaskCol] = React.useState(null);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--upcom-coral", tweaks.primaryColor);
    document.documentElement.setAttribute("data-theme", tweaks.theme);
  }, [tweaks.primaryColor, tweaks.theme]);

  const filtered = tasks.filter(t => {
    if (search && !t.title.toLowerCase().includes(search.toLowerCase()) && !t.id.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterAssignees.length > 0 && !t.assignees.some(a => filterAssignees.includes(a))) return false;
    if (filterPriority && t.priority !== filterPriority) return false;
    if (filterProject && t.project !== filterProject) return false;
    return true;
  });

  const tasksByCol = (colId) => filtered.filter(t => t.col === colId);

  const onDragStart = (task, e) => { setDraggingId(task.id); e.dataTransfer.effectAllowed = "move"; };
  const onDragEnd = () => { setDraggingId(null); setDragOverCol(null); };
  const onDrop = (colId) => { if (draggingId) { setTasks(tasks.map(t => t.id === draggingId ? { ...t, col: colId } : t)); } setDraggingId(null); setDragOverCol(null); };

  const handleCreateTask = (taskData) => {
    const maxId = Math.max(...tasks.map(t => parseInt(t.id.replace("T-","")) || 0), 400);
    setTasks(prev => [...prev, { ...taskData, id: "T-" + (maxId + 1) }]);
  };

  const totalForProgress = tasks.filter(t => t.col !== "backlog").length;
  const doneCount = tasks.filter(t => t.col === "done").length;
  const reviewCount = tasks.filter(t => t.col === "review" || t.col === "client").length;
  const doingCount = tasks.filter(t => t.col === "doing").length;
  const overdueCount = tasks.filter(t => { if (t.col === "done" || !t.due) return false; return window.dueState(t.due).state === "overdue"; }).length;

  const toggleAssignee = (id) => setFilterAssignees(filterAssignees.includes(id) ? filterAssignees.filter(a => a !== id) : [...filterAssignees, id]);

  return (
    <>
      <div className={"app" + (collapsed ? " collapsed" : "")}>
        <TasksSidebar />
        <div className="main">
          <Topbar collapsed={collapsed} setCollapsed={setCollapsed} />
          <div className="content">
            <div className="page-header">
              <div className="page-title-block">
                <h1 className="page-title">Tarefas</h1>
                <div className="page-subtitle">Sprint <strong>#21</strong> · 28 abr — 11 mai · <strong>{filtered.length}</strong> tarefas{overdueCount > 0 && <> · <strong style={{color:"var(--danger)"}}>{overdueCount} atrasadas</strong></>}</div>
              </div>
              <div className="filters">
                <div className="view-switch">
                  <button className={view==="kanban"?"active":""} onClick={()=>setView("kanban")}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="6" height="16" rx="1"/><rect x="11" y="4" width="6" height="10" rx="1"/><rect x="19" y="4" width="2" height="6" rx="1"/></svg>Kanban</button>
                  <button className={view==="list"?"active":""} onClick={()=>setView("list")}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Lista</button>
                  <button className={view==="cal"?"active":""} onClick={()=>setView("cal")}><Icon.Calendar />Calendário</button>
                </div>
                <button className="btn-secondary"><Icon.Download /> Exportar</button>
                <button className="btn-primary" onClick={() => setNewTaskCol("todo")}><Icon.Plus /> Nova tarefa</button>
              </div>
            </div>

            <div className="sprint-bar">
              <div className="sprint-info"><div className="sprint-name">Sprint 21 — Foco: Anima Pet & Nova Skin<span className="pill">11 dias restantes</span></div><div className="sprint-meta">Iniciado em 28 abr · término previsto 11 mai · 6 pessoas</div></div>
              <div className="sprint-progress">
                <div className="sprint-progress-track">
                  <div className="seg-done" style={{width:(doneCount/totalForProgress*100)+"%"}}></div>
                  <div className="seg-review" style={{width:(reviewCount/totalForProgress*100)+"%"}}></div>
                  <div className="seg-doing" style={{width:(doingCount/totalForProgress*100)+"%"}}></div>
                </div>
                <div className="sprint-progress-numbers"><span><strong>{doneCount}</strong> concluídas</span><span><strong>{reviewCount}</strong> revisão</span><span><strong>{doingCount}</strong> ativas</span><span>de <strong>{totalForProgress}</strong></span></div>
              </div>
              <div className="sprint-team">
                <div className="sprint-team-label">Time ativo</div>
                <div style={{display:"flex"}}>{D.TEAM.map(m => (<div key={m.id} className="av-mini" style={{background:m.color,width:30,height:30,fontSize:11,borderRadius:"50%",display:"grid",placeItems:"center",color:"#fff",fontWeight:700,border:"2px solid var(--surface)",marginLeft:-7,fontFamily:"var(--font-display)"}} title={m.name}>{m.initials}</div>))}</div>
              </div>
            </div>

            <div className="tasks-toolbar">
              <div className="search" style={{maxWidth:280}}>
                <Icon.Search /><input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="Buscar tarefas..." />
              </div>
              <div className="assignee-filters">
                {D.TEAM.map(m => (<button key={m.id} className={"assignee-chip" + (filterAssignees.includes(m.id) ? " active" : "")} onClick={()=>toggleAssignee(m.id)} title={m.name}><span className="av" style={{background:m.color,opacity:filterAssignees.length===0||filterAssignees.includes(m.id)?1:0.4}}>{m.initials}</span></button>))}
              </div>
              <button className={"filter-chip" + (filterPriority==="high"?" active":"")} onClick={()=>setFilterPriority(filterPriority==="high"?null:"high")}><span className="col-dot" style={{background:"var(--danger)"}}></span>Alta prioridade</button>
              <select className="filter-chip" style={{appearance:"none",paddingRight:24}} value={filterProject||""} onChange={(e)=>setFilterProject(e.target.value||null)}>
                <option value="">Todos os projetos</option>
                {D.PROJECTS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <button className="filter-chip"><Icon.Filter /> Mais filtros</button>
              {(filterAssignees.length>0||filterPriority||filterProject||search) && (<button className="filter-chip" onClick={()=>{setFilterAssignees([]);setFilterPriority(null);setFilterProject(null);setSearch("");}} style={{color:"var(--upcom-coral)"}}>Limpar filtros</button>)}
              <div className="spacer"></div>
              <span style={{fontSize:11,color:"var(--muted)"}}>{filtered.length} de {tasks.length} tarefas</span>
            </div>

            {view === "kanban" && (
              <div className="board-wrap">
                <div className="board">
                  {D.COLUMNS.map(col => (<Column key={col.id} col={col} tasks={tasksByCol(col.id)} onOpen={setOpenTask} onDragStart={onDragStart} onDragEnd={onDragEnd} draggingId={draggingId} onDrop={onDrop} dragOver={dragOverCol===col.id} onDragEnter={(id)=>setDragOverCol(id)} onAdd={() => setNewTaskCol(col.id)} />))}
                </div>
              </div>
            )}

            {view === "list" && (
              <div className="card">
                <div className="table-wrap">
                  <table className="data">
                    <thead><tr><th style={{paddingLeft:18,width:60}}>ID</th><th>Tarefa</th><th>Projeto</th><th>Status</th><th>Prioridade</th><th>Resp.</th><th>Prazo</th><th style={{paddingRight:18}}>Check.</th></tr></thead>
                    <tbody>
                      {filtered.map(t => {
                        const p = t.project ? D.PROJECTS.find(x=>x.id===t.project) : null;
                        const due = window.dueState(t.due);
                        const col = D.COLUMNS.find(c=>c.id===t.col);
                        return (
                          <tr key={t.id} onClick={()=>setOpenTask(t)}>
                            <td style={{paddingLeft:18,fontFamily:"var(--font-mono)",fontSize:11,color:"var(--muted)"}}>{t.id}</td>
                            <td style={{fontWeight:600,color:"var(--ink)"}}>{t.title}</td>
                            <td>{p ? <span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:2,background:p.color}}></span>{p.name}</span> : <span style={{color:"var(--muted)"}}>—</span>}</td>
                            <td><span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12}}><span className={"col-dot "+t.col}></span>{col.name}</span></td>
                            <td><span className={"task-priority priority-"+t.priority}>{{high:"Alta",med:"Média",low:"Baixa"}[t.priority]}</span></td>
                            <td><div className="task-assignees">{t.assignees.map(a=><Avatar key={a} id={a} size={24} />)}</div></td>
                            <td><span className={"deadline-cell "+(due.state==="overdue"?"late":due.state==="due-today"?"soon":"")}>{due.label}</span></td>
                            <td style={{paddingRight:18,fontFamily:"var(--font-mono)",fontSize:11}}>{t.checklist[0]}/{t.checklist[1]}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {view === "cal" && (
              <div className="card" style={{padding:60,textAlign:"center"}}>
                <Icon.Calendar style={{width:40,height:40,color:"var(--muted-2)"}} />
                <h3 style={{marginTop:12,fontFamily:"var(--font-display)"}}>Visão de calendário</h3>
                <p style={{color:"var(--muted)",fontSize:13}}>Em breve — em desenvolvimento</p>
              </div>
            )}
          </div>
        </div>
      </div>

      {openTask && <TaskModal task={openTask} onClose={()=>setOpenTask(null)} />}
      {newTaskCol !== null && <NewTaskModal defaultCol={newTaskCol} onClose={() => setNewTaskCol(null)} onSave={handleCreateTask} />}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Marca"><TweakColor label="Cor primária" value={tweaks.primaryColor} onChange={v => setTweak("primaryColor", v)} /></TweakSection>
        <TweakSection title="Aparência"><TweakRadio label="Tema" value={tweaks.theme} onChange={v => setTweak("theme", v)} options={[{value:"light",label:"Claro"},{value:"dark",label:"Escuro"}]} /></TweakSection>
        <TweakSection title="Cores rápidas">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["#E85D44","Coral"],["#0E0E0E","Preto"],["#2C6BB8","Azul"],["#2F8F5F","Verde"],["#9333EA","Roxo"],["#C77A1B","Âmbar"]].map(([c,n]) => (
              <button key={c} onClick={()=>setTweak("primaryColor",c)} title={n} style={{width:32,height:32,borderRadius:8,background:c,border:tweaks.primaryColor===c?"2px solid var(--ink)":"1px solid var(--border)",cursor:"pointer",padding:0}} />
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<TasksApp />);
</script>
</body>
</html>
